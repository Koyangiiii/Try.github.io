<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koyani</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ffb7e7; /* สีสไตล์ GitHub */
            color: white;
            padding: 2rem 0;
        }
        .container {
            margin: 2rem auto;
            max-width: 800px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
        }
        p {
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ea44f;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #22863a;
        }
    </style>
</head>
<body>

    <header>
        <h1>รับทำป้าย ลายน้ำ โลโก้ 🌍</h1>
    </header>

    <div class="container">
        <h2>สวัสดีจ้า ยินดีต้อนรับเข้าสู่ koyangi</h2>
        <p>อ่านก่อนจะงานทางร้าน <strong>GitHub Pages</strong></p>
        <p>ไม่เข้าใจตรงไหนสามารถสอบถามทางร้านได้เลย</p>
        
        <a href="https://github.com" target="_blank" class="btn">ไปที่ GitHub ของฉัน</a>
    </div>

</body>
</html>
